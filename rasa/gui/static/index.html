<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RASA Control Panel</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --gray: #6b7280;
    --blue: #58a6ff;
    --accent: #2f81f7;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }
  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 18px;
    font-weight: 600;
  }
  .header h1 span { color: var(--blue); }
  .header-version {
    font-size: 12px;
    color: var(--text-dim);
    margin-left: 8px;
  }
  .header-status {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .header-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .header-status .dot.green { background: var(--green); }
  .header-status .dot.red { background: var(--red); }
  /* Tabs */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .tab-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 10px 20px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
  }
  /* Content */
  .content {
    padding: 20px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }
  /* Service groups */
  .service-group { margin-bottom: 24px; }
  .service-group summary {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-dim);
    cursor: pointer;
    padding: 8px 0;
    user-select: none;
  }
  .service-group summary:hover { color: var(--text); }
  /* Service cards */
  .service-card {
    display: grid;
    grid-template-columns: 32px 1fr auto auto auto;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 4px;
    transition: background .15s;
  }
  .service-card:hover { background: var(--surface2); }
  .status-dot {
    width: 12px; height: 12px; border-radius: 50%;
    flex-shrink: 0;
    transition: background .3s;
  }
  .status-dot.running { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.4); }
  .status-dot.stopped { background: var(--red); }
  .status-dot.starting { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.unknown { background: var(--gray); }
  .status-dot.error { background: var(--red); }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .4; }
  }
  .svc-name { font-weight: 500; }
  .svc-name .detail {
    font-weight: 400;
    color: var(--text-dim);
    font-size: 12px;
    margin-left: 8px;
  }
  .svc-badges { display: flex; gap: 6px; align-items: center; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .badge.port { color: var(--blue); border-color: var(--blue); }
  .badge.version { color: var(--text); }
  .svc-actions { display: flex; gap: 6px; align-items: center; }
  .btn {
    font-size: 12px;
    padding: 4px 14px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-family: inherit;
    transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-start { border-color: var(--green); color: var(--green); }
  .btn-start:hover:not(:disabled) { background: rgba(34,197,80,.1); }
  .btn-stop { border-color: var(--red); color: var(--red); }
  .btn-stop:hover:not(:disabled) { background: rgba(239,68,68,.1); }
  .btn-external {
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: default;
  }
  .svc-deps-warn {
    font-size: 11px;
    color: var(--yellow);
    margin-left: 6px;
    cursor: help;
  }
  /* Slash commands */
  .cmd-search {
    width: 100%;
    padding: 8px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .cmd-search::placeholder { color: var(--text-dim); }
  .cmd-search:focus { outline: none; border-color: var(--blue); }
  .cmd-category { margin-bottom: 16px; }
  .cmd-category h3 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: .05em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .cmd-row {
    display: grid;
    grid-template-columns: 160px 1fr 60px;
    gap: 12px;
    padding: 6px 12px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .cmd-row .cmd { font-family: 'Consolas', 'Courier New', monospace; color: var(--blue); }
  .cmd-row .cmd-desc { color: var(--text-dim); }
  .btn-copy {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    font-family: inherit;
  }
  .btn-copy:hover { background: var(--surface2); color: var(--text); }
  /* About */
  .about-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 8px 24px;
    max-width: 500px;
  }
  .about-grid dt {
    color: var(--text-dim);
    font-weight: 500;
  }
  .about-grid dd { color: var(--text); }
  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--text-dim); }
  /* Toast notification */
  .toast {
    position: fixed; bottom: 20px; right: 20px;
    padding: 10px 18px; border-radius: 6px;
    font-size: 13px; z-index: 100;
    max-width: 400px;
    animation: fadeIn .2s ease-out;
    box-shadow: 0 4px 12px rgba(0,0,0,.3);
  }
  .toast.error { background: #7f1d1d; border: 1px solid var(--red); color: #fca5a5; }
  .toast.success { background: #14532d; border: 1px solid var(--green); color: #86efac; }
  .toast.info { background: #1e3a5f; border: 1px solid var(--blue); color: #93c5fd; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 700px) {
    .service-card { grid-template-columns: 24px 1fr auto; }
    .svc-badges { display: none; }
    .cmd-row { grid-template-columns: 1fr; }
    .content { padding: 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1><span>RASA</span> Control Panel</h1>
    <div class="header-version" id="headerVersion">v0.1.0</div>
  </div>
  <div class="header-status" id="headerStatus">
    <span><span class="dot green"></span><span id="runningCount">0</span> running</span>
    <span><span class="dot red"></span><span id="stoppedCount">0</span> stopped</span>
  </div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="services">Services</button>
  <button class="tab-btn" data-tab="commands">Slash Commands</button>
  <button class="tab-btn" data-tab="about">About</button>
</div>

<div class="content">
  <!-- SERVICES TAB -->
  <div class="tab-pane active" id="tab-services">
    <div id="services-container"><div class="loading">Loading services...</div></div>
  </div>

  <!-- COMMANDS TAB -->
  <div class="tab-pane" id="tab-commands">
    <input type="text" class="cmd-search" id="cmdSearch" placeholder="Search commands..." oninput="filterCommands()">
    <div id="cmd-list"></div>
  </div>

  <!-- ABOUT TAB -->
  <div class="tab-pane" id="tab-about">
    <div id="about-container"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
// ── Tab switching ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => {
      p.classList.remove('active');
    });
    btn.classList.add('active');
    const pane = document.getElementById('tab-' + btn.dataset.tab);
    pane.classList.add('active');
  });
});

// ── Services ──
let servicesData = [];

function renderServices(services) {
  servicesData = services;
  const groups = {};
  const groupNames = { infrastructure: 'Infrastructure', 'control-plane': 'Control Plane', agents: 'Agents', observability: 'Observability' };
  const groupOrder = ['infrastructure', 'control-plane', 'agents', 'observability'];

  services.forEach(s => {
    if (!groups[s.group]) groups[s.group] = [];
    groups[s.group].push(s);
  });

  let html = '';
  let running = 0, stopped = 0;
  groupOrder.forEach(g => {
    if (!groups[g]) return;
    html += `<details class="service-group" open><summary>${groupNames[g] || g} (${groups[g].length})</summary>`;
    groups[g].forEach(s => {
      if (s.status === 'running') running++;
      else if (s.status === 'stopped') stopped++;
      const dotClass = s.status === 'starting' || s.status === 'stopping' ? 'starting' : s.status;
      html += `<div class="service-card" data-id="${s.id}">`;
      html += `<div class="status-dot ${dotClass}" title="${s.status_detail}"></div>`;
      let depsNote = '';
      if (s.depends_on && s.depends_on.length) {
        const depsStatus = s.depends_on.map(d => {
          const dep = servicesData.find(x => x.id === d);
          return dep ? `${d}=${dep.status}` : `${d}=?`;
        }).join(', ');
        const depsDown = s.depends_on.filter(d => {
          const dep = servicesData.find(x => x.id === d);
          return dep && dep.status !== 'running';
        });
        if (depsDown.length && s.status !== 'running') {
          depsNote = `<span class="svc-deps-warn" title="Dependencies: ${depsStatus}">&#x26A0;</span>`;
        } else {
          depsNote = `<span class="svc-deps-warn" title="Dependencies: ${depsStatus}">*</span>`;
        }
      }
      html += `<div class="svc-name">${s.display_name}${depsNote}</div>`;
      html += `<div class="svc-badges">`;
      html += `<span class="badge version">v${s.min_version}</span>`;
      if (s.port) html += `<span class="badge port">:${s.port}</span>`;
      html += `</div>`;
      html += `<div style="font-size:12px;color:var(--text-dim);min-width:60px">${s.status_detail || s.status}</div>`;
      html += `<div class="svc-actions">`;
      if (s.is_external) {
        html += `<span class="btn-external">external</span>`;
      } else if (s.status === 'running') {
        html += `<button class="btn btn-stop" onclick="stopService('${s.id}')">Stop</button>`;
      } else if (s.status === 'starting' || s.status === 'stopping') {
        html += `<button class="btn" disabled>${s.status}...</button>`;
      } else {
        html += `<button class="btn btn-start" onclick="startService('${s.id}')">Start</button>`;
      }
      html += `</div></div>`;
    });
    html += '</details>';
  });
  document.getElementById('services-container').innerHTML = html;
  document.getElementById('runningCount').textContent = running;
  document.getElementById('stoppedCount').textContent = stopped;
}

async function fetchServices() {
  try {
    const r = await fetch('/api/services');
    const data = await r.json();
    renderServices(data.services);
  } catch (e) {
    // Silently retry
  }
}

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.remove(); }, 4000);
}

async function startService(id) {
  const card = document.querySelector(`.service-card[data-id="${id}"]`);
  if (card) card.querySelector('.status-dot').className = 'status-dot starting';
  try {
    const r = await fetch(`/api/services/${id}/start`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) {
      toast(data.detail || 'Failed to start', 'error');
    } else {
      toast(`Starting ${id}...`, 'info');
    }
    setTimeout(fetchServices, 1500);
  } catch (e) {
    toast('Failed to start service', 'error');
  }
  setTimeout(fetchServices, 1500);
}

async function stopService(id) {
  const card = document.querySelector(`.service-card[data-id="${id}"]`);
  if (card) card.querySelector('.status-dot').className = 'status-dot starting';
  try {
    const r = await fetch(`/api/services/${id}/stop`, { method: 'POST' });
    if (!r.ok) {
      const err = await r.json();
      toast(err.detail || 'Failed to stop', 'error');
    } else {
      toast(`${id} stopped`, 'info');
    }
  } catch (e) {
    toast('Failed to stop service', 'error');
  }
  setTimeout(fetchServices, 1500);
}

// ── Slash Commands ──
let commandsData = [];

async function fetchCommands() {
  try {
    const r = await fetch('/api/slash-commands');
    const data = await r.json();
    commandsData = data.commands || [];
    renderCommands(commandsData);
  } catch (e) { /* ignore */ }
}

function renderCommands(cmds) {
  const categories = {};
  cmds.forEach(c => {
    if (!categories[c.category]) categories[c.category] = [];
    categories[c.category].push(c);
  });
  let html = '';
  for (const [cat, items] of Object.entries(categories)) {
    html += `<div class="cmd-category"><h3>${cat}</h3>`;
    items.forEach(c => {
      html += `<div class="cmd-row" data-cmd="${c.command}" data-desc="${c.description.toLowerCase()}">`;
      html += `<span class="cmd">${c.command}</span>`;
      html += `<span class="cmd-desc">${c.description}</span>`;
      html += `<button class="btn-copy" onclick="copyCommand('${c.command}')">Copy</button>`;
      html += `</div>`;
    });
    html += '</div>';
  }
  document.getElementById('cmd-list').innerHTML = html || '<p style="color:var(--text-dim)">No commands found.</p>';
}

function filterCommands() {
  const q = document.getElementById('cmdSearch').value.toLowerCase();
  if (!commandsData.length) return;
  const filtered = commandsData.filter(c =>
    c.command.toLowerCase().includes(q) || c.description.toLowerCase().includes(q)
  );
  renderCommands(filtered);
}

function copyCommand(cmd) {
  navigator.clipboard.writeText(cmd);
}

// ── About ──
async function fetchAbout() {
  try {
    const r = await fetch('/api/about');
    const data = await r.json();
    const html = `
      <dl class="about-grid">
        <dt>RASA Version</dt><dd>${data.rasa_version}</dd>
        <dt>Python Version</dt><dd>${data.python_version}</dd>
        <dt>Go Version</dt><dd>${data.go_version}</dd>
        <dt>Operating System</dt><dd>${data.os}</dd>
        <dt>Hostname</dt><dd>${data.hostname}</dd>
        <dt>Project Root</dt><dd><code style="color:var(--blue)">${data.project_root}</code></dd>
      </dl>`;
    document.getElementById('about-container').innerHTML = html;
    document.getElementById('headerVersion').textContent = 'v' + data.rasa_version;
  } catch (e) {
    document.getElementById('about-container').innerHTML =
      '<p style="color:var(--text-dim)">Failed to load info.</p>';
  }
}

// ── Init ──
fetchServices();
fetchCommands();
fetchAbout();
setInterval(fetchServices, 5000);
</script>
</body>
</html>
