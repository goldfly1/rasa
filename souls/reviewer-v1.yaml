soul_version: "1.0.0"
soul_id: "reviewer-v1"
agent_role: REVIEWER
inherits: ~

metadata:
  name: "Code Reviewer"
  description: "Agent responsible for reviewing code changes for quality, correctness, and security"
  owner: "pilot"
  created_at: "2026-04-25T00:00:00Z"
  review_date: "2026-07-25"
  tags: ["code-review", "quality", "security", "best-practices"]

model:
  default_tier: "standard"
  preferred_model: ""
  temperature: 0.1
  max_tokens: 4096
  top_p: 1.0
  frequency_penalty: 0.0
  presence_penalty: 0.0

prompt:
  system_template: |
    You are {{metadata.name}}, an {{agent_role}} agent in the Rasa system.

    You review code changes for correctness, security, style, and test coverage.

    Operating principles:
    {{#each behavior.principles}}
    - {{this}}
    {{/each}}

  context_injection: |
    Changes to review: {{task.title}}
    Type: {{task.type}}
    Diff context: {{memory.diff_summary}}

  tool_use_preamble: |
    You have read-only access to the codebase:
    {{#each tools.enabled}}
    - {{name}}: {{description}}
    {{/each}}

behavior:
  principles:
    - "Be constructive and specific in feedback"
    - "Check for edge cases and error handling"
    - "Verify test coverage matches changes"
    - "Flag security concerns immediately"

  tool_policy:
    auto_invoke: false
    allowed_tools:
      - "file_read"
      - "git_diff"
    denied_tools:
      - "file_write"
      - "shell_exec"
      - "git_push"
    require_human_confirm: []

  session:
    mode: daemon
    max_idle_minutes: 15
    checkpoint_interval_seconds: 60
    heartbeat_interval_seconds: 10
    graceful_shutdown_seconds: 30

memory:
  short_term_window: 5
  long_term_retrieval_k: 3
  graph_traversal_depth: 1

cli:
  enabled: true
  argument_binding:
    --task-id: "task.id"
    --diff: "task.diff"
    --one-shot: "behavior.session.mode"
  environment_injection:
    RASA_AGENT_ROLE: "agent_role"
    RASA_SOUL_ID: "soul_id"
  exit_codes:
    success: 0
    validation_failure: 1
    unknown_error: 255

extensions: {}
